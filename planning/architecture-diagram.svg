<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="SF Mono, Fira Code, Cascadia Code, monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8b949e" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#d29922" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Background (full viewBox coverage) -->
  <rect x="0" y="0" width="1440" height="900" fill="#0d1117" rx="8"/>

  <!-- ============================================================ -->
  <!-- TITLE -->
  <!-- ============================================================ -->
  <text x="720" y="38" text-anchor="middle" fill="#c9d1d9" font-size="18" font-weight="bold">Clawfarm Architecture</text>
  <text x="720" y="56" text-anchor="middle" fill="#484f58" font-size="11">Agent testing farm  ·  eval-as-server  ·  pluggable memory variants</text>

  <!-- ============================================================ -->
  <!-- FARM (center) -->
  <!-- ============================================================ -->
  <rect x="570" y="200" width="300" height="400" rx="6" fill="none" stroke="#30363d" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="720" y="224" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="2">CLAWFARM</text>

  <!-- Storage (inside farm, top) -->
  <rect x="600" y="240" width="240" height="70" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="720" y="264" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="bold">Storage</text>
  <text x="720" y="282" text-anchor="middle" fill="#8b949e" font-size="10">eval-results.json</text>
  <text x="720" y="296" text-anchor="middle" fill="#8b949e" font-size="10">eval-metadata.json</text>

  <!-- Orchestration Server (inside farm, middle) -->
  <rect x="600" y="330" width="240" height="100" rx="4" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="720" y="358" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Orchestration Server</text>
  <text x="720" y="380" text-anchor="middle" fill="#8b949e" font-size="10">Agent Registry</text>
  <text x="720" y="395" text-anchor="middle" fill="#8b949e" font-size="10">Eval Dispatch</text>
  <text x="720" y="410" text-anchor="middle" fill="#8b949e" font-size="10">Cost Accumulator</text>

  <!-- Arrow: Storage <-> Orchestration -->
  <line x1="720" y1="310" x2="720" y2="330" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Frontend Dashboard (inside farm, bottom) -->
  <rect x="600" y="450" width="240" height="70" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="720" y="474" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="bold">Frontend Dashboard</text>
  <text x="720" y="492" text-anchor="middle" fill="#8b949e" font-size="10">SPA: Dashboard / Evals / Matrix</text>
  <text x="720" y="506" text-anchor="middle" fill="#8b949e" font-size="10">Cost / Variants / Agent Detail</text>

  <!-- Arrow: Orchestration <-> Dashboard -->
  <line x1="720" y1="430" x2="720" y2="450" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Port label (clarified) -->
  <text x="720" y="555" text-anchor="middle" fill="#484f58" font-size="10">Express on localhost:3847</text>

  <!-- ============================================================ -->
  <!-- OPENCLAW (above agents) -->
  <!-- ============================================================ -->
  <rect x="110" y="70" width="380" height="60" rx="4" fill="#1c2128" stroke="#d29922" stroke-width="1.5"/>
  <text x="300" y="96" text-anchor="middle" fill="#d29922" font-size="13" font-weight="bold">Memory &amp; Tool Abstracted OpenClaw</text>
  <text x="300" y="114" text-anchor="middle" fill="#8b949e" font-size="10">CLI agent engine  ·  plugin system  ·  session mgmt</text>

