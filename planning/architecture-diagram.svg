  <rect x="200" y="205" width="200" height="120" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="300" y="226" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Agent Variant A</text>
  <line x1="215" y1="234" x2="385" y2="234" stroke="#21262d" stroke-width="1"/>
  <text x="300" y="252" text-anchor="middle" fill="#c9d1d9" font-size="10">Agent Runtime</text>
  <rect x="215" y="261" width="170" height="20" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="275" text-anchor="middle" fill="#8b949e" font-size="9">Memory Abstraction</text>
  <rect x="215" y="286" width="170" height="20" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="300" text-anchor="middle" fill="#8b949e" font-size="9">Tool Abstraction</text>

  <!-- Agent Tile 2 -->
  <rect x="200" y="340" width="200" height="120" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="300" y="361" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Agent Variant B</text>
  <line x1="215" y1="369" x2="385" y2="369" stroke="#21262d" stroke-width="1"/>
  <text x="300" y="387" text-anchor="middle" fill="#c9d1d9" font-size="10">Agent Runtime</text>
  <rect x="215" y="396" width="170" height="20" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="410" text-anchor="middle" fill="#8b949e" font-size="9">Memory Abstraction</text>
  <rect x="215" y="421" width="170" height="20" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="435" text-anchor="middle" fill="#8b949e" font-size="9">Tool Abstraction</text>

  <!-- Agent Tile 3 -->
  <rect x="200" y="475" width="200" height="120" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="300" y="496" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Agent Variant C</text>
  <line x1="215" y1="504" x2="385" y2="504" stroke="#21262d" stroke-width="1"/>
  <text x="300" y="522" text-anchor="middle" fill="#c9d1d9" font-size="10">Agent Runtime</text>
  <rect x="215" y="531" width="170" height="20" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="545" text-anchor="middle" fill="#8b949e" font-size="9">Memory Abstraction</text>
  <rect x="215" y="556" width="170" height="20" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="300" y="570" text-anchor="middle" fill="#8b949e" font-size="9">Tool Abstraction</text>

  <!-- ============================================================ -->
  <!-- MEMORY VARIANT SERVERS (far left, now fully on-canvas) -->
  <!-- ============================================================ -->

  <!-- Memory Variant 1 (connected to Agent A) -->
  <rect x="20" y="215" width="140" height="100" rx="4" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="90" y="240" text-anchor="middle" fill="#d29922" font-size="10" font-weight="bold">Memory Variant</text>
  <text x="90" y="253" text-anchor="middle" fill="#d29922" font-size="10" font-weight="bold">Server</text>
  <line x1="30" y1="260" x2="150" y2="260" stroke="#21262d" stroke-width="1"/>
  <text x="90" y="278" text-anchor="middle" fill="#c9d1d9" font-size="10">Memory Interface</text>
  <text x="90" y="296" text-anchor="middle" fill="#8b949e" font-size="9">native-0D</text>

  <!-- Arrow: Memory 1 -> Agent A -->
  <line x1="160" y1="265" x2="200" y2="265" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Memory Variant 2 (connected to Agent B) -->
  <rect x="20" y="350" width="140" height="100" rx="4" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="90" y="375" text-anchor="middle" fill="#d29922" font-size="10" font-weight="bold">Memory Variant</text>
  <text x="90" y="388" text-anchor="middle" fill="#d29922" font-size="10" font-weight="bold">Server</text>
  <line x1="30" y1="395" x2="150" y2="395" stroke="#21262d" stroke-width="1"/>
  <text x="90" y="413" text-anchor="middle" fill="#c9d1d9" font-size="10">Memory Interface</text>
  <text x="90" y="431" text-anchor="middle" fill="#8b949e" font-size="9">graph-1D</text>

  <!-- Arrow: Memory 2 -> Agent B -->
  <line x1="160" y1="400" x2="200" y2="400" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Memory Variant 3 (connected to Agent C) -->
  <rect x="20" y="485" width="140" height="100" rx="4" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="90" y="510" text-anchor="middle" fill="#d29922" font-size="10" font-weight="bold">Memory Variant</text>
  <text x="90" y="523" text-anchor="middle" fill="#d29922" font-size="10" font-weight="bold">Server</text>
  <line x1="30" y1="530" x2="150" y2="530" stroke="#21262d" stroke-width="1"/>
  <text x="90" y="548" text-anchor="middle" fill="#c9d1d9" font-size="10">Memory Interface</text>
  <text x="90" y="566" text-anchor="middle" fill="#8b949e" font-size="9">vector-2D</text>

  <!-- Arrow: Memory 3 -> Agent C -->
  <line x1="160" y1="535" x2="200" y2="535" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- ============================================================ -->
  <!-- Arrows: Agents -> Farm -->
  <!-- ============================================================ -->
  <path d="M420,380 Q500,380 570,380" fill="none" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="495" y="360" text-anchor="middle" fill="#3fb950" font-size="9">heartbeat, register,</text>
  <text x="495" y="372" text-anchor="middle" fill="#3fb950" font-size="9">/eval/*</text>

  <!-- ============================================================ -->
  <!-- EVALS (right side) -->
  <!-- ============================================================ -->

  <!-- Eval 1: Vending Bench -->
  <rect x="950" y="210" width="240" height="120" rx="4" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="1070" y="234" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="bold">Eval Server</text>
  <text x="1070" y="250" text-anchor="middle" fill="#484f58" font-size="10">vending-bench</text>
  <line x1="965" y1="258" x2="1175" y2="258" stroke="#21262d" stroke-width="1"/>
  <rect x="965" y="266" width="210" height="20" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="1070" y="280" text-anchor="middle" fill="#c9d1d9" font-size="10">Eval Interface (HTTP contract)</text>
  <rect x="965" y="293" width="210" height="24" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="1070" y="309" text-anchor="middle" fill="#8b949e" font-size="10">Eval Logic (365-day sim loop)</text>

  <!-- Eval 2: Constraint Propagation -->
  <rect x="950" y="360" width="240" height="120" rx="4" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="1070" y="384" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="bold">Eval Server</text>
  <text x="1070" y="400" text-anchor="middle" fill="#484f58" font-size="10">constraint-propagation</text>
  <line x1="965" y1="408" x2="1175" y2="408" stroke="#21262d" stroke-width="1"/>
  <rect x="965" y="416" width="210" height="20" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="1070" y="430" text-anchor="middle" fill="#c9d1d9" font-size="10">Eval Interface (scripted)</text>
  <rect x="965" y="443" width="210" height="24" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="1070" y="459" text-anchor="middle" fill="#8b949e" font-size="10">Eval Logic (message scoring)</text>

  <!-- Eval 3: Future eval placeholder -->
  <rect x="950" y="510" width="240" height="120" rx="4" fill="#161b22" stroke="#bc8cff" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="1070" y="534" text-anchor="middle" fill="#bc8cff" font-size="12" opacity="0.5">Eval Server</text>
  <text x="1070" y="550" text-anchor="middle" fill="#484f58" font-size="10">future-eval</text>
  <line x1="965" y1="558" x2="1175" y2="558" stroke="#21262d" stroke-width="1" opacity="0.5"/>
  <rect x="965" y="566" width="210" height="20" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>
  <text x="1070" y="580" text-anchor="middle" fill="#c9d1d9" font-size="10" opacity="0.5">Eval Interface</text>
  <rect x="965" y="593" width="210" height="24" rx="3" fill="#1c2128" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>
  <text x="1070" y="609" text-anchor="middle" fill="#8b949e" font-size="10" opacity="0.5">Eval Logic</text>

  <!-- ============================================================ -->
  <!-- Arrows: Evals -> Farm -->
  <!-- ============================================================ -->
  <path d="M950,380 Q900,380 870,380" fill="none" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="910" y="366" text-anchor="middle" fill="#bc8cff" font-size="9">results, progress</text>

  <!-- Arrow from orchestration to eval (dispatch) -->
  <path d="M870,360 Q890,350 950,300" fill="none" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text x="910" y="322" text-anchor="middle" fill="#58a6ff" font-size="9">spawn</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="570" y="700" width="300" height="145" rx="4" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="590" y="722" fill="#8b949e" font-size="11" font-weight="bold">Legend</text>

  <line x1="590" y1="740" x2="620" y2="740" stroke="#3fb950" stroke-width="2"/>
  <text x="630" y="744" fill="#8b949e" font-size="10">Agent -> Farm (heartbeat, /eval/*)</text>

  <line x1="590" y1="762" x2="620" y2="762" stroke="#bc8cff" stroke-width="2"/>
  <text x="630" y="766" fill="#8b949e" font-size="10">Eval -> Farm (results, progress)</text>

  <line x1="590" y1="784" x2="620" y2="784" stroke="#d29922" stroke-width="2"/>
  <text x="630" y="788" fill="#8b949e" font-size="10">Memory Variant -> Agent (pluggable)</text>

  <line x1="590" y1="806" x2="620" y2="806" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="630" y="810" fill="#8b949e" font-size="10">Farm -> Eval (dispatch / spawn)</text>

  <rect x="590" y="820" width="30" height="12" rx="2" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="630" y="831" fill="#8b949e" font-size="10">System boundary (separate process)</text>

</svg>
